name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Run vet
        run: make lint

      - name: Check Windows build graph
        run: make test-windows

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows binary
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=${{ matrix.arch }} GOCACHE=/tmp/vimwhat-go-build go build -trimpath -o dist/vimwhat-windows-${{ matrix.arch }}.exe ./cmd/vimwhat

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: vimwhat-windows-${{ matrix.arch }}
          path: dist/vimwhat-windows-${{ matrix.arch }}.exe
          if-no-files-found: error
